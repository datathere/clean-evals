name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,postgres]"
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: mypy --strict
        run: mypy src/

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e ".[dev,postgres]"
      - name: pytest
        env:
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: pytest -ra
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python }}
          path: coverage.xml

  examples-load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Examples load
        # One file cannot meet the project-wide coverage floor; this job
        # checks that the shipped examples load, not coverage.
        run: pytest tests/unit/test_examples_load.py -v --no-cov

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/clean_evals/web/static

  build-wheel:
    runs-on: ubuntu-latest
    needs: [lint-and-types, tests, frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install build hatchling
      - name: Build frontend
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify wheel ships static assets
        run: |
          unzip -l dist/*.whl | grep -E "clean_evals/web/static/(index\.html|assets/)" || (echo "missing static assets in wheel" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
