name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/clean-evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install build hatchling
      - name: Build frontend
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Build wheel + sdist
        run: python -m build
      - name: Verify wheel ships static assets
        # A publish is irreversible for the version; never ship a wheel
        # whose frontend bundle silently came out empty.
        run: |
          unzip -l dist/*.whl | grep -E "clean_evals/web/static/(index\.html|assets/)" || (echo "missing static assets in wheel" && exit 1)
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
