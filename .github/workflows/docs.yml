name: Docs

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[docs]"
      - name: Build site
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  # GitHub Pages is unavailable while the repository is private; the build
  # job above still validates the docs. Deployment starts working the day
  # the repository goes public.
  deploy:
    if: ${{ !github.event.repository.private }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-retry.outputs.page_url || steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true
      # The Pages backend intermittently rejects deployments with
      # "Deployment failed, try again later"; one retry has cleared it
      # each time so far.
      - id: deploy-retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5
