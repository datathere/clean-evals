site_name: clean-evals
site_description: Try out your prompts and context across AI models. Run evals and find the best model for your use case.
# Deploy target of .github/workflows/docs.yml (GitHub Pages for this repo).
# Not live until the repo is public and Pages is enabled.
site_url: https://datathere.github.io/clean-evals
repo_url: https://github.com/datathere/clean-evals
repo_name: datathere/clean-evals
edit_uri: edit/main/docs/docs/

docs_dir: docs/docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - The golden path: flow.md
  - Concepts:
      - Datasets: concepts/datasets.md
      - Scorers: concepts/scorers.md
      - Adapters: concepts/adapters.md
      - Reporters: concepts/reporters.md
      - Recommendations math: concepts/recommendations.md
  - Guides:
      - Dataset Builder: guides/dataset-builder.md
      - Writing a scorer: guides/writing-a-scorer.md
      - Writing an adapter: guides/writing-an-adapter.md
      - Writing a reporter: guides/writing-a-reporter.md
      - Production data and PII: guides/pii.md
      - Running clean-evals: guides/deployment.md
      - Cost ceilings: guides/cost-ceilings.md
  - Reference:
      - Public API: api.md
      - CLI: cli.md
  - Brand policy: branding.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/datathere/clean-evals
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/clean-evals/

extra_css:
  - stylesheets/extra.css
